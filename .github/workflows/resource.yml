name: Resource

on:
  push:
    branches: [master]
    paths:
      - 'services/resource/**'
      - '.github/workflows/resource.yml'
  pull_request:
    paths:
      - 'services/resource/**'
      - '.github/workflows/resource.yml'

defaults:
  run:
    working-directory: services/resource

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    container:
      image: hopara/resource-base:latest
    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
          - 8080:8080
        env:
          SERVICES: s3,cloudfront,sqs
          AWS_DEFAULT_REGION: us-east-1
          LOCALSTACK_AUTH_TOKEN: ${{ vars.LOCALSTACK_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          micromamba install -y -n hopara -c conda-forge -f ./consumer/requirements-conda.txt -f ./api/requirements-conda.txt
          micromamba run -n hopara pip install -r ./api/requirements.txt -r ./consumer/requirements.txt
          micromamba run -n hopara pip install mypy isort
          micromamba run -n hopara pip install -e .

      - name: Import linter
        run: micromamba run -n hopara lint-imports

      - name: Mypy
        run: micromamba run -n hopara mypy -p api -p consumer -p common

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    container:
      image: hopara/resource-base:latest
    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
          - 8080:8080
        env:
          SERVICES: s3,cloudfront,sqs
          AWS_DEFAULT_REGION: us-east-1
          LOCALSTACK_AUTH_TOKEN: ${{ vars.LOCALSTACK_AUTH_TOKEN }}
    env:
      DD_TRACE_ENABLED: "false"
      LOG_LEVEL: warn
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          micromamba install -y -n hopara -c conda-forge -f ./consumer/requirements-conda.txt -f ./api/requirements-conda.txt
          micromamba run -n hopara pip install -r ./api/requirements.txt -r ./consumer/requirements.txt
          micromamba run -n hopara pip install unittest-xml-reporting mypy isort xmlrunner rembg onnxruntime
          micromamba run -n hopara pip install -e .

      - name: Run tests
        run: micromamba run -n hopara python -m unittest discover -s tests -t .
        env: 
          AWS_ACCESS_KEY_ID: test # required for localstack
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1

  build-and-push-api:
    name: Build & Push API Image
    needs: [lint, test]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/resource
          file: services/resource/api/Dockerfile
          push: true
          tags: |
            hopara/resource-api:latest
            hopara/resource-api:${{ github.run_number }}

  build-and-push-consumer:
    name: Build & Push Consumer Image
    needs: [lint, test]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/resource
          file: services/resource/consumer/Dockerfile
          push: true
          tags: |
            hopara/resource-consumer:latest
            hopara/resource-consumer:${{ github.run_number }}

name: BFF

on:
  push:
    branches: [master]
    paths:
      - 'services/bff/**'
      - '.github/workflows/bff.yml'
  pull_request:
    paths:
      - 'services/bff/**'
      - '.github/workflows/bff.yml'

defaults:
  run:
    working-directory: services/bff

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & Yarn
        uses: ./.github/actions/setup-node-yarn

      - name: Install dependencies
        run: yarn

      - name: Audit dependencies
        run: yarn npm audit

      - name: Lint
        run: yarn lint

      - name: Run tests
        run: yarn test

      - name: Build
        run: |
          yarn build
          yarn workspaces focus --production

      - name: Set build version
        id: version
        run: echo "version=$(jq -r .version package.json)+${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bff-build
          path: |
            services/bff/out
            services/bff/node_modules
            services/bff/package.json

  build-and-push:
    name: Build & Push Image
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: bff-build
          path: services/bff

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/bff
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            hopara/bff:latest
            hopara/bff:${{ github.run_number }}

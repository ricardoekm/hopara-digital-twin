name: Template

on:
  push:
    branches: [master]
    paths:
      - 'services/template/**'
      - '.github/workflows/template.yml'
  pull_request:
    paths:
      - 'services/template/**'
      - '.github/workflows/template.yml'

defaults:
  run:
    working-directory: services/template

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & Yarn
        uses: ./.github/actions/setup-node-yarn

      - name: Install dependencies
        run: yarn

      - name: Audit dependencies
        run: yarn npm audit

      - name: Lint
        run: yarn lint

      - name: Run tests
        run: yarn test

      - name: Build
        run: |
          yarn build
          yarn workspaces focus --production

      - name: Set build version
        id: version
        run: echo "version=$(jq -r .version package.json)+${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: template-build
          path: |
            services/template/out
            services/template/node_modules
            services/template/package.json
            services/template/templates

  build-and-push:
    name: Build & Push Image
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: template-build
          path: services/template

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/template
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            hopara/template:latest
            hopara/template:${{ github.run_number }}

name: Dataset

on:
  push:
    branches: [master]
    paths:
      - 'services/dataset/**'
      - '.github/workflows/dataset.yml'
  pull_request:
    paths:
      - 'services/dataset/**'
      - '.github/workflows/dataset.yml'

defaults:
  run:
    working-directory: services/dataset

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    container:
      image: azul/zulu-openjdk:23
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        run: bash ./gradlew test

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    container:
      image: azul/zulu-openjdk:23
    services:
      postgres:
        image: hopara/postgres:latest
        options: >-
          --health-cmd "pg_isready -U kyrix"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Run integration tests
        env:
          DATABASE_SERVER: postgres
        run: bash ./gradlew integrationTest

  build:
    name: Build
    runs-on: ubuntu-latest
    container:
      image: azul/zulu-openjdk:23
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          echo ${{ github.run_number }} > .buildVersion
          bash ./gradlew build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dataset-build
          path: |
            services/dataset/build/libs/*.jar
            services/dataset/agents

  build-and-push:
    name: Build & Push Image
    needs: [test, integration-test, build]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dataset-build
          path: services/dataset

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/dataset
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            hopara/dataset:latest
            hopara/dataset:${{ github.run_number }}

name: Visualization

on:
  push:
    branches: [master]
    paths:
      - 'services/visualization/**'
      - '.github/workflows/visualization.yml'
  pull_request:
    paths:
      - 'services/visualization/**'
      - '.github/workflows/visualization.yml'

defaults:
  run:
    working-directory: services/visualization

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    container:
      image: hopara/node-yarn:latest
    services:
      postgres:
        image: hopara/postgres:latest
        options: >-
          --health-cmd "pg_isready -U hopara"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y jq
          yarn

      - name: Audit dependencies
        run: yarn npm audit

      - name: Lint
        run: yarn lint

      - name: Build schemas
        run: yarn build-schemas

      - name: Build
        run: yarn build

      - name: Run migrations
        run: yarn migrate

      - name: Run tests
        run: yarn test

      - name: Build docs
        run: yarn build-docs

      - name: Prune dev dependencies
        run: yarn workspaces focus --production

      - name: Set build version
        id: version
        run: echo "version=$(jq -r .version package.json)+${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: visualization-build
          path: |
            services/visualization/out
            services/visualization/node_modules
            services/visualization/package.json
            services/visualization/config

  build-and-push:
    name: Build & Push Image
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: visualization-build
          path: services/visualization

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/visualization
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            hopara/visualization:latest
            hopara/visualization:${{ github.run_number }}
